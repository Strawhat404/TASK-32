services:
  db:
    image: postgres:16-alpine
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    environment:
      POSTGRES_DB: task3
      POSTGRES_USER: task3
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data:z
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} psql -h 127.0.0.1 -U task3 -d task3 -tAc \"SELECT 1 FROM roles LIMIT 1\" >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: task3
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: task3
      APP_AES_KEY: ${APP_AES_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ALLOWED_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./unit_tests:/unit_tests:ro
      - ./API_tests:/API_tests:ro
      - ./frontend:/frontend:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE: http://localhost:3000
    ports:
      - "5173:5173"

volumes:
  db_data:
